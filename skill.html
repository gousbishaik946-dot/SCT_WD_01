<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Navigation Menu</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
    scroll-behavior:smooth;
}

body{
    background:#f5f5f5;
}

/* Navigation Bar */
nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:transparent;
    transition:0.4s;
    z-index:1000;
}

nav.scrolled{
    background:#0d6efd;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.logo{
    color:#fff;
    font-size:28px;
    font-weight:bold;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:20px;
}

nav ul li a{
    text-decoration:none;
    color:#fff;
    padding:10px 15px;
    border-radius:5px;
    transition:0.3s;
    font-size:18px;
}

nav ul li a:hover{
    background:#fff;
    color:#0d6efd;
}

/* Sections */
section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    text-align:center;
}

#home{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

#about{
    background:#6c63ff;
}

#services{
    background:#ff6b6b;
}

#portfolio{
    background:#20c997;
}

#contact{
    background:#343a40;
}

h1{
    font-size:50px;
    margin-bottom:15px;
}

p{
    font-size:20px;
}
</style>

</head>
<body>

<nav id="navbar">
    <div class="logo">SkillCraft</div>

    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#portfolio">Portfolio</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<section id="home">
    <h1>Welcome</h1>
    <p>Scroll down to see the navigation menu change color.</p>
</section>

<section id="about">
    <h1>About</h1>
    <p>This is the About section.</p>
</section>

<section id="services">
    <h1>Services</h1>
    <p>Our services are displayed here.</p>
</section>

<section id="portfolio">
    <h1>Portfolio</h1>
    <p>Our recent projects are shown here.</p>
</section>

<section id="contact">
    <h1>Contact</h1>
    <p>Email: example@gmail.com</p>
</section>

<script>
window.addEventListener("scroll", function(){
    let navbar = document.getElementById("navbar");

    if(window.scrollY > 50){
        navbar.classList.add("scrolled");
    }else{
        navbar.classList.remove("scrolled");
    }
});
</script>

</body>
</html>
